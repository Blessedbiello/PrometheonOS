name: ci

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: rust (fmt · clippy · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      # Unit suite + network-free integration tests. Includes tests/proof_pipeline.rs, which gates
      # the submit→telemetry→export wiring (the lifecycle-log deliverable). Live tests are env-gated.
      - run: cargo test --workspace
      - run: cargo run -q -p prometheon-telemetry --bin schema-gen -- --check # contracts/ drift

  ts:
    name: ai-agent (typecheck · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Drift-check the JSON-Schema → TS half of the contract (the Rust → JSON-Schema half is gated in
      # the rust job via `schema-gen --check`). Together they enforce the single cross-language contract.
      - name: contracts/ts drift (JSON Schema → TS)
        run: |
          for f in contracts/json-schema/*.schema.json; do
            base="$(basename "$f" .schema.json)"
            npx --yes json-schema-to-typescript@15 -i "$f" -o "contracts/ts/${base}.d.ts"
          done
          git diff --exit-code -- contracts/ts \
            || { echo "::error::contracts/ts is stale — run scripts/gen-contracts.sh and commit"; exit 1; }
      - run: pnpm --filter @prometheon/ai-agent typecheck
      - run: pnpm --filter @prometheon/ai-agent test
      - run: pnpm --filter @prometheon/dashboard typecheck
      - run: pnpm --filter @prometheon/dashboard test

  audit:
    name: dependency audit (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true # advisory: a new transitive advisory should not red the pipeline
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level high
